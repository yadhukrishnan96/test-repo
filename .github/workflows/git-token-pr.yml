name: PR Comment

on:
  pull_request:
    types:
      - opened
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
          --repo ${{ github.repository }} \
          --body "Build passed ✅"
