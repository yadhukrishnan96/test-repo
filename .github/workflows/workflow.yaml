name: branch-logic-test
on:
  push:
    branches:
      - main 
      - feature/**
    paths:
      - 'src/**'
      - 'tests/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: |
          echo "Running tests on branch: ${{ github.ref_name }}"
          echo "This runs on ALL branches when src/ or tests/ changes"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'main'
    steps:
      - uses: actions/checkout@v6
      - name: Deploy
        run: |
          echo "Deploying from main branch"
